apiVersion: v1
kind: Namespace
metadata:
  name: swipejobs

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: swipejobs
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: ghcr.io/chaitanyajoshi1769/swipejobs-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: swipejobs
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: swipejobs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.swipejobs.com
    secretName: swipejobs-tls
  rules:
  - host: api.swipejobs.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 80

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: swipejobs
data:
  redis-url: "redis://redis-service:6379"
  elasticsearch-url: "http://elasticsearch:9200"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: swipejobs
type: Opaque
stringData:
  database-url: ""
  jwt-secret: ""
  stripe-key: ""
  aws-access-key: ""
  aws-secret-key: ""
